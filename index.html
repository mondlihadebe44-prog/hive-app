<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hive 🐝</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --gold:#F5C518;--orange:#FF6B35;--dark-bg:#0D0D0F;--dark-card:#16161A;--dark-border:#2a2a2e;--light-bg:#FAF9F6;--light-card:#FFFFFF;--light-border:#E8E6E1; }
  * { margin:0;padding:0;box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh; }
  .phone { width:390px;height:844px;background:var(--dark-bg);border-radius:48px;overflow:hidden;position:relative;box-shadow:0 40px 120px rgba(0,0,0,0.8),inset 0 0 0 1px rgba(255,255,255,0.08);border:2px solid #222; }
  .phone.light-mode { background:var(--light-bg); }
  .screen { position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden; }
  .screen.active { display:flex; }

  /* SPLASH */
  #splash { background:var(--dark-bg);align-items:center;justify-content:center;flex-direction:column;gap:16px; }
  .splash-logo { font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:var(--gold);display:flex;align-items:center;gap:10px;animation:splashPop 0.8s cubic-bezier(0.34,1.56,0.64,1) both; }
  .splash-tagline { color:rgba(255,255,255,0.4);font-size:14px;letter-spacing:2px;text-transform:uppercase;animation:fadeUp 0.6s ease both 0.5s; }
  .splash-ring { width:180px;height:180px;border-radius:50%;border:2px solid rgba(245,197,24,0.15);position:absolute;animation:pulseRing 2s ease infinite; }
  .splash-ring:nth-child(2) { width:260px;height:260px;animation-delay:0.3s; }
  .splash-ring:nth-child(3) { width:340px;height:340px;animation-delay:0.6s; }
  @keyframes splashPop { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
  @keyframes fadeUp { from{transform:translateY(10px);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes pulseRing { 0%,100%{opacity:0.3;transform:scale(1)} 50%{opacity:0.1;transform:scale(1.05)} }

  /* AUTH */
  #auth { background:var(--dark-bg);padding:60px 32px 40px;align-items:center;overflow-y:auto; }
  .auth-logo { font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:var(--gold);display:flex;align-items:center;gap:8px;margin-bottom:6px; }
  .auth-tagline { color:rgba(255,255,255,0.4);font-size:13px;margin-bottom:32px; }
  .auth-tabs { display:flex;background:rgba(255,255,255,0.05);border-radius:14px;padding:4px;width:100%;margin-bottom:32px; }
  .auth-tab { flex:1;padding:10px;border-radius:11px;border:none;background:transparent;color:rgba(255,255,255,0.4);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s; }
  .auth-tab.active { background:var(--gold);color:#000;font-weight:700; }
  .field { margin-bottom:16px;width:100%; }
  .field label { display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:8px; }
  .field input { width:100%;padding:14px 16px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s; }
  .field input:focus { border-color:var(--gold);background:rgba(245,197,24,0.05); }
  .field input::placeholder { color:rgba(255,255,255,0.2); }
  .btn-primary { width:100%;padding:16px;background:var(--gold);color:#000;border:none;border-radius:14px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:all 0.2s; }
  .btn-primary:hover { transform:translateY(-1px);box-shadow:0 8px 24px rgba(245,197,24,0.3); }
  .btn-primary:disabled { opacity:0.6;cursor:not-allowed;transform:none; }
  .auth-error { background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.3);border-radius:10px;padding:10px 14px;color:#ff6b6b;font-size:13px;margin-bottom:12px;width:100%;display:none; }
  .auth-success { background:rgba(80,255,150,0.1);border:1px solid rgba(80,255,150,0.3);border-radius:10px;padding:10px 14px;color:#50ff96;font-size:13px;margin-bottom:12px;width:100%;display:none; }

  /* APP */
  #app { flex-direction:row; }
  .sidebar { width:60px;background:var(--dark-card);border-right:1px solid var(--dark-border);display:flex;flex-direction:column;align-items:center;padding:60px 0 32px;gap:4px;flex-shrink:0; }
  .phone.light-mode .sidebar { background:#F0EDE8;border-right-color:var(--light-border); }
  .nav-logo { font-family:'Syne',sans-serif;font-weight:800;color:var(--gold);font-size:18px;margin-bottom:20px; }
  .nav-item { width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all 0.2s;position:relative; }
  .nav-item:hover { background:rgba(245,197,24,0.1); }
  .nav-item.active { background:rgba(245,197,24,0.15); }
  .nav-item.active::before { content:'';position:absolute;left:-1px;width:3px;height:24px;background:var(--gold);border-radius:0 4px 4px 0; }
  .sidebar-bottom { margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:8px; }
  .theme-btn { width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.4);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s; }
  .signout-btn { width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(255,80,80,0.3);background:transparent;color:rgba(255,80,80,0.6);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s; }
  .signout-btn:hover { border-color:#ff5050;color:#ff5050; }
  .avatar-nav { width:36px;height:36px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#000;cursor:pointer; }
  .main-content { flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none; }
  .main-content::-webkit-scrollbar { display:none; }

  /* FEED */
  .feed-header { padding:24px 20px 16px;position:sticky;top:0;background:var(--dark-bg);z-index:10;border-bottom:1px solid var(--dark-border); }
  .phone.light-mode .feed-header { background:var(--light-bg);border-bottom-color:var(--light-border); }
  .feed-title { font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px;margin-bottom:16px; }
  .phone.light-mode .feed-title { color:#0D0D0F; }
  .stories-bar { display:flex;gap:14px;overflow-x:auto;scrollbar-width:none;margin-bottom:16px; }
  .story-item { display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0; }
  .story-avatar { width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:22px;border:2.5px solid var(--gold);transition:transform 0.2s; }
  .story-avatar:hover { transform:scale(1.05); }
  .story-name { font-size:10px;color:rgba(255,255,255,0.5);text-align:center;font-weight:500; }
  .feed-tabs { display:flex;gap:24px; }
  .feed-tab { font-size:13px;font-weight:600;color:rgba(255,255,255,0.3);cursor:pointer;padding-bottom:4px;border:none;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;background:none;transition:all 0.2s; }
  .feed-tab.active { color:var(--gold);border-bottom-color:var(--gold); }

  /* COMPOSE */
  .compose-box { margin:16px;background:var(--dark-card);border:1px solid var(--dark-border);border-radius:18px;padding:16px; }
  .phone.light-mode .compose-box { background:#fff;border-color:var(--light-border); }
  .compose-top { display:flex;align-items:flex-start;gap:12px;margin-bottom:12px; }
  .compose-avatar { width:36px;height:36px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#000;flex-shrink:0; }
  .compose-input { flex:1;background:none;border:none;border-bottom:1.5px solid var(--dark-border);padding:6px 0 10px;color:rgba(255,255,255,0.5);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;width:100%; }
  .compose-bottom { display:flex;align-items:center;justify-content:space-between; }
  .compose-actions { display:flex;gap:10px; }
  .compose-action { font-size:18px;cursor:pointer;opacity:0.6;transition:all 0.2s; }
  .post-btn { padding:8px 18px;background:var(--gold);color:#000;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all 0.2s; }
  .post-btn:hover { transform:translateY(-1px);box-shadow:0 4px 16px rgba(245,197,24,0.3); }

  /* POST */
  .post-card { margin:0 16px 12px;background:var(--dark-card);border:1px solid var(--dark-border);border-radius:18px;padding:16px;transition:border-color 0.2s; }
  .post-card:hover { border-color:rgba(245,197,24,0.2); }
  .phone.light-mode .post-card { background:#fff;border-color:var(--light-border); }
  .post-header { display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px; }
  .post-user { display:flex;align-items:center;gap:10px;cursor:pointer; }
  .post-avatar { width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#000;flex-shrink:0; }
  .post-name { font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#fff; }
  .phone.light-mode .post-name { color:#0D0D0F; }
  .post-handle { font-size:12px;color:rgba(255,255,255,0.35); }
  .phone.light-mode .post-handle { color:rgba(0,0,0,0.4); }
  .post-more { color:rgba(255,255,255,0.3);font-size:18px;cursor:pointer;background:none;border:none; }
  .post-body { font-size:14px;line-height:1.6;color:rgba(255,255,255,0.75);margin-bottom:12px; }
  .phone.light-mode .post-body { color:rgba(0,0,0,0.7); }
  .post-hashtag { color:var(--orange);font-weight:500;cursor:pointer; }
  .post-actions { display:flex;align-items:center;gap:6px;position:relative; }
  .action-btn { display:flex;align-items:center;gap:5px;padding:7px 10px;border-radius:10px;border:none;background:transparent;color:rgba(255,255,255,0.4);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s; }
  .action-btn:hover { background:rgba(255,255,255,0.06); }
  .action-icon { font-size:16px; }
  .like-btn.liked { color:#ff4d6d!important; }
  .like-btn.liked .action-icon { animation:heartPop 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes heartPop { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }
  .particles { position:absolute;top:50%;left:50%;pointer-events:none; }
  .particle { position:absolute;font-size:12px;animation:particleFly 0.6s ease forwards;opacity:0; }
  @keyframes particleFly { 0%{transform:translate(-50%,-50%) scale(0);opacity:1} 100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0.5);opacity:0} }
  .follow-btn { margin-left:auto;padding:6px 14px;border-radius:20px;border:1.5px solid var(--gold);background:transparent;color:var(--gold);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap; }
  .follow-btn.following { background:var(--gold);color:#000; }

  .loading-posts { text-align:center;padding:40px 20px;color:rgba(255,255,255,0.3);font-size:14px; }
  .loading-spinner { width:32px;height:32px;border:3px solid rgba(245,197,24,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .empty-state { text-align:center;padding:40px 20px; }
  .empty-state .empty-icon { font-size:48px;margin-bottom:12px; }
  .empty-state .empty-text { color:rgba(255,255,255,0.3);font-size:14px; }
  .load-more { text-align:center;padding:20px;color:rgba(255,255,255,0.2);font-size:12px; }

  /* COMMENTS */
  .comments-section { margin-top:12px;border-top:1px solid var(--dark-border);padding-top:12px;display:none; }
  .phone.light-mode .comments-section { border-top-color:var(--light-border); }
  .comments-section.open { display:block; }
  .comment { display:flex;gap:10px;margin-bottom:10px; }
  .comment-avatar { width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-family:'Syne',sans-serif;font-weight:700;color:#000;flex-shrink:0; }
  .comment-name { font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:rgba(255,255,255,0.7);margin-bottom:2px; }
  .comment-text { font-size:12px;color:rgba(255,255,255,0.5);line-height:1.5; }
  .comment-input-row { display:flex;gap:8px;margin-top:8px;align-items:center; }
  .comment-input { flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:8px 12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;outline:none; }
  .comment-input::placeholder { color:rgba(255,255,255,0.2); }
  .comment-send { padding:8px 12px;background:var(--gold);border:none;border-radius:10px;color:#000;font-weight:700;font-size:11px;cursor:pointer;font-family:'Syne',sans-serif; }

  .toast { position:absolute;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(245,197,24,0.95);color:#000;padding:10px 20px;border-radius:20px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:200; }
  .toast.show { opacity:1;transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="phone" id="phone">
  <div class="toast" id="toast"></div>

  <!-- SPLASH -->
  <div class="screen active" id="splash">
    <div class="splash-ring"></div>
    <div class="splash-ring"></div>
    <div class="splash-ring"></div>
    <div class="splash-logo"><span>🐝</span> Hive</div>
    <div class="splash-tagline">Your community. Your vibe.</div>
  </div>

  <!-- AUTH -->
  <div class="screen" id="auth">
    <div class="auth-logo"><span>🐝</span> Hive</div>
    <div class="auth-tagline">Your community. Your vibe.</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('signup')">Create Account</button>
      <button class="auth-tab" onclick="switchAuthTab('signin')">Sign In</button>
    </div>
    <div id="auth-error" class="auth-error"></div>
    <div id="auth-success" class="auth-success"></div>
    <div id="signup-panel" style="width:100%">
      <div class="field"><label>Full Name</label><input type="text" id="signup-name" placeholder="Your full name"></div>
      <div class="field"><label>Username</label><input type="text" id="signup-username" placeholder="yourusername"></div>
      <div class="field"><label>Email Address</label><input type="email" id="signup-email" placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input type="password" id="signup-password" placeholder="Min. 8 characters"></div>
      <button class="btn-primary" id="signup-btn" onclick="signUp()">Join the Hive 🐝</button>
    </div>
    <div id="signin-panel" style="width:100%;display:none">
      <div class="field"><label>Email Address</label><input type="email" id="signin-email" placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input type="password" id="signin-password" placeholder="Your password"></div>
      <button class="btn-primary" id="signin-btn" onclick="signIn()">Sign In →</button>
    </div>
  </div>

  <!-- APP -->
  <div class="screen" id="app">
    <nav class="sidebar">
      <div class="nav-logo">🐝</div>
      <div class="nav-item active" onclick="setNav(this,'feed')">🏠</div>
      <div class="nav-item" onclick="setNav(this,'explore')">🔍</div>
      <div class="nav-item" onclick="setNav(this,'notifs')">🔔</div>
      <div class="nav-item" onclick="setNav(this,'profile')">👤</div>
      <div class="sidebar-bottom">
        <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
        <button class="signout-btn" onclick="signOut()" title="Sign out">↩</button>
        <div class="avatar-nav" id="nav-avatar">?</div>
      </div>
    </nav>
    <div class="main-content">
      <!-- FEED -->
      <div id="feed-panel">
        <div class="feed-header">
          <div class="feed-title">Your Hive 🍯</div>
          <div class="stories-bar">
            <div class="story-item"><div class="story-avatar">😎</div><div class="story-name">You</div></div>
            <div class="story-item"><div class="story-avatar">🌸</div><div class="story-name">Sara</div></div>
            <div class="story-item"><div class="story-avatar">🚀</div><div class="story-name">DevMike</div></div>
            <div class="story-item"><div class="story-avatar">🎨</div><div class="story-name">ArtLena</div></div>
          </div>
          <div class="feed-tabs">
            <button class="feed-tab active" onclick="switchTab(this)">For You</button>
            <button class="feed-tab" onclick="switchTab(this)">Following</button>
            <button class="feed-tab" onclick="switchTab(this)">Trending</button>
          </div>
        </div>
        <div class="compose-box">
          <div class="compose-top">
            <div class="compose-avatar" id="compose-avatar">?</div>
            <input class="compose-input" placeholder="Share something with the Hive..." id="compose-text">
          </div>
          <div class="compose-bottom">
            <div class="compose-actions">
              <span class="compose-action">🖼️</span>
              <span class="compose-action">😊</span>
              <span class="compose-action">📍</span>
            </div>
            <button class="post-btn" onclick="postVibe()">Post to Hive 🐝</button>
          </div>
        </div>
        <div id="posts-container"><div class="loading-posts"><div class="loading-spinner"></div>Loading vibes...</div></div>
        <div class="load-more" id="load-more-text"></div>
      </div>
      <!-- EXPLORE -->
      <div id="explore-panel" style="display:none;padding:24px 16px">
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#fff;margin-bottom:16px">Explore 🔍</div>
        <input style="width:100%;padding:12px 16px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.08);border-radius:14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:20px" placeholder="Search users, hashtags, vibes...">
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:12px">TRENDING</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          <span style="padding:8px 14px;background:rgba(245,197,24,0.1);border:1px solid rgba(245,197,24,0.3);border-radius:20px;color:var(--gold);font-size:13px;cursor:pointer">#hiveapp</span>
          <span style="padding:8px 14px;background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.3);border-radius:20px;color:var(--orange);font-size:13px;cursor:pointer">#buildinpublic</span>
          <span style="padding:8px 14px;background:rgba(245,197,24,0.1);border:1px solid rgba(245,197,24,0.3);border-radius:20px;color:var(--gold);font-size:13px;cursor:pointer">#vibes</span>
        </div>
      </div>
      <!-- NOTIFICATIONS -->
      <div id="notifs-panel" style="display:none;padding:24px 16px">
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#fff;margin-bottom:16px">Notifications 🔔</div>
        <div class="empty-state"><div class="empty-icon">🔔</div><div class="empty-text">No notifications yet</div></div>
      </div>
      <!-- PROFILE -->
      <div id="profile-panel" style="display:none;padding:24px 16px">
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#fff;margin-bottom:20px">My Profile 👤</div>
        <div style="text-align:center;padding:20px 0">
          <div style="width:80px;height:80px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:32px;color:#000;margin:0 auto 12px" id="profile-avatar-big">?</div>
          <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#fff" id="profile-name-big">...</div>
          <div style="color:rgba(255,255,255,0.4);font-size:13px;margin-top:4px" id="profile-handle-big">@...</div>
          <div style="color:rgba(255,255,255,0.5);font-size:13px;margin-top:8px" id="profile-bio-big">...</div>
        </div>
        <div style="display:flex;gap:16px;justify-content:center;margin-top:16px">
          <div style="text-align:center">
            <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--gold)" id="my-posts-count">0</div>
            <div style="color:rgba(255,255,255,0.4);font-size:11px">Posts</div>
          </div>
          <div style="text-align:center">
            <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--gold)" id="my-followers-count">0</div>
            <div style="color:rgba(255,255,255,0.4);font-size:11px">Followers</div>
          </div>
          <div style="text-align:center">
            <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--gold)" id="my-following-count">0</div>
            <div style="color:rgba(255,255,255,0.4);font-size:11px">Following</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://yaqdplheuddatviwaijl.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhcWRwbGhldWRkYXR2aXdhaWpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTAyNzIsImV4cCI6MjA5MjI4NjI3Mn0.4nP976ApNp2_-a8VIEfe-hSvFVvQ0o1G4nwS_1GK-hk';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;
  let currentProfile = null;

  // INIT
  setTimeout(async () => {
    document.getElementById('splash').classList.remove('active');
    const { data: { session } } = await sb.auth.getSession();
    if (session) { currentUser = session.user; await loadProfile(); showApp(); }
    else document.getElementById('auth').classList.add('active');
  }, 2200);

  // AUTH TABS
  function switchAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('signup-panel').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('signin-panel').style.display = tab === 'signin' ? 'block' : 'none';
    hideMessages();
  }

  function showError(msg) { const e = document.getElementById('auth-error'); e.textContent = msg; e.style.display = 'block'; document.getElementById('auth-success').style.display = 'none'; }
  function showSuccess(msg) { const e = document.getElementById('auth-success'); e.textContent = msg; e.style.display = 'block'; document.getElementById('auth-error').style.display = 'none'; }
  function hideMessages() { document.getElementById('auth-error').style.display = 'none'; document.getElementById('auth-success').style.display = 'none'; }

  async function signUp() {
    const name = document.getElementById('signup-name').value.trim();
    const username = document.getElementById('signup-username').value.trim().replace('@','');
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    if (!name || !username || !email || !password) { showError('Please fill in all fields!'); return; }
    if (password.length < 8) { showError('Password must be at least 8 characters!'); return; }
    const btn = document.getElementById('signup-btn');
    btn.disabled = true; btn.textContent = 'Creating account...';
    const { data, error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name, username } } });
    if (error) { showError(error.message); btn.disabled = false; btn.textContent = 'Join the Hive 🐝'; return; }
    if (data.user) {
      await sb.from('profiles').upsert({ id: data.user.id, username, full_name: name, bio: 'New to the Hive! 🐝' });
      currentUser = data.user; await loadProfile(); showApp();
    }
  }

  async function signIn() {
    const email = document.getElementById('signin-email').value.trim();
    const password = document.getElementById('signin-password').value;
    if (!email || !password) { showError('Please fill in all fields!'); return; }
    const btn = document.getElementById('signin-btn');
    btn.disabled = true; btn.textContent = 'Signing in...';
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { showError(error.message); btn.disabled = false; btn.textContent = 'Sign In →'; return; }
    currentUser = data.user; await loadProfile(); showApp();
  }

  async function signOut() {
    await sb.auth.signOut(); currentUser = null; currentProfile = null;
    document.getElementById('app').classList.remove('active');
    document.getElementById('auth').classList.add('active');
    showToast('Signed out! 👋');
  }

  async function loadProfile() {
    if (!currentUser) return;
    const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    if (data) {
      currentProfile = data;
      const initial = (data.full_name || data.username || 'U')[0].toUpperCase();
      const color = getColor(data.full_name || 'User');
      document.getElementById('nav-avatar').textContent = initial;
      document.getElementById('nav-avatar').style.background = color;
      document.getElementById('compose-avatar').textContent = initial;
      document.getElementById('compose-avatar').style.background = color;
      document.getElementById('profile-avatar-big').textContent = initial;
      document.getElementById('profile-avatar-big').style.background = color;
      document.getElementById('profile-name-big').textContent = data.full_name || '';
      document.getElementById('profile-handle-big').textContent = '@' + (data.username || '');
      document.getElementById('profile-bio-big').textContent = data.bio || '';
    }
  }

  function showApp() {
    document.getElementById('auth').classList.remove('active');
    document.getElementById('app').classList.add('active');
    loadPosts();
    showToast('Welcome to Hive! 🐝');
  }

  // POSTS
  async function loadPosts() {
    const container = document.getElementById('posts-container');
    container.innerHTML = '<div class="loading-posts"><div class="loading-spinner"></div>Loading vibes...</div>';
    const { data: posts, error } = await sb.from('posts').select('*, profiles(username,full_name)').order('created_at', { ascending: false }).limit(20);
    if (error || !posts || posts.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">🐝</div><div class="empty-text">No vibes yet! Be the first to post!</div></div>';
      return;
    }
    container.innerHTML = '';
    posts.forEach(post => container.appendChild(createPostCard(post)));
    document.getElementById('load-more-text').textContent = "You're all caught up 🐝";
  }

  function createPostCard(post) {
    const p = post.profiles || {};
    const name = p.full_name || 'Unknown';
    const username = p.username || 'unknown';
    const initial = name[0].toUpperCase();
    const isOwn = currentUser && post.user_id === currentUser.id;
    const card = document.createElement('div');
    card.className = 'post-card';
    card.dataset.postId = post.id;
    card.innerHTML = `
      <div class="post-header">
        <div class="post-user">
          <div class="post-avatar" style="background:${getColor(name)};color:#000">${initial}</div>
          <div><div class="post-name">${name}</div><div class="post-handle">@${username} · ${timeAgo(post.created_at)}</div></div>
        </div>
        <button class="post-more">···</button>
      </div>
      <div class="post-body">${formatBody(post.body)}</div>
      <div class="post-actions">
        <button class="action-btn like-btn" onclick="toggleLike(this,'${post.id}')">
          <span class="action-icon">🤍</span><span class="like-count">0</span>
          <div class="particles"></div>
        </button>
        <button class="action-btn comment-toggle-btn" onclick="toggleComments(this,'${post.id}')">
          <span class="action-icon">💬</span><span class="comment-count">0</span>
        </button>
        <button class="action-btn"><span class="action-icon">🔁</span> 0</button>
        ${!isOwn ? `<button class="follow-btn" onclick="toggleFollow(this,'${post.user_id}')">Follow</button>` : ''}
      </div>
      <div class="comments-section" id="comments-${post.id}">
        <div class="comments-list"></div>
        <div class="comment-input-row">
          <input class="comment-input" placeholder="Add a comment..." id="comment-input-${post.id}">
          <button class="comment-send" onclick="submitComment('${post.id}')">Send</button>
        </div>
      </div>`;
    loadLikes(post.id, card);
    loadCommentCount(post.id, card);
    return card;
  }

  async function loadCommentCount(postId, card) {
    const { count } = await sb.from('comments').select('*', { count: 'exact', head: true }).eq('post_id', postId);
    const el = card.querySelector('.comment-count');
    if (el) el.textContent = count || 0;
  }

  async function toggleComments(btn, postId) {
    const section = document.getElementById('comments-' + postId);
    const isOpen = section.classList.contains('open');
    section.classList.toggle('open');
    if (!isOpen) {
      await loadComments(postId);
    }
  }

  async function loadComments(postId) {
    const section = document.getElementById('comments-' + postId);
    const list = section.querySelector('.comments-list');
    list.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:12px;padding:8px 0">Loading...</div>';
    const { data: comments } = await sb.from('comments').select('*, profiles(username, full_name)').eq('post_id', postId).order('created_at', { ascending: true });
    list.innerHTML = '';
    if (!comments || comments.length === 0) {
      list.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:12px;padding:4px 0">No comments yet. Be first! 🐝</div>';
      return;
    }
    comments.forEach(c => {
      const p = c.profiles || {};
      const name = p.full_name || 'Unknown';
      const initial = name[0].toUpperCase();
      const div = document.createElement('div');
      div.className = 'comment';
      div.innerHTML = `
        <div class="comment-avatar" style="background:${getColor(name)}">${initial}</div>
        <div>
          <div class="comment-name">${name}</div>
          <div class="comment-text">${c.body}</div>
        </div>`;
      list.appendChild(div);
    });
  }

  async function submitComment(postId) {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { showToast('Sign in to comment!'); return; }
    const input = document.getElementById('comment-input-' + postId);
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    const { error } = await sb.from('comments').insert({ post_id: postId, user_id: session.user.id, body: text });
    if (error) { showToast('Error posting comment!'); return; }
    await loadComments(postId);
    // Update comment count
    const card = document.querySelector(`[data-post-id="${postId}"]`);
    if (card) {
      const countEl = card.querySelector('.comment-count');
      if (countEl) countEl.textContent = parseInt(countEl.textContent || 0) + 1;
    }
    showToast('Comment posted! 💬');
  }

  async function loadLikes(postId, card) {
    const { count } = await sb.from('likes').select('*', { count: 'exact', head: true }).eq('post_id', postId);
    const el = card.querySelector('.like-count');
    if (el) el.textContent = count || 0;
    if (currentUser) {
      const { data } = await sb.from('likes').select('id').eq('post_id', postId).eq('user_id', currentUser.id).maybeSingle();
      if (data) { const btn = card.querySelector('.like-btn'); if (btn) { btn.classList.add('liked'); btn.querySelector('.action-icon').textContent = '❤️'; } }
    }
  }

  async function toggleLike(btn, postId) {
    if (!currentUser) { showToast('Sign in to like!'); return; }
    const isLiked = btn.classList.contains('liked');
    const countEl = btn.querySelector('.like-count');
    const icon = btn.querySelector('.action-icon');
    const count = parseInt(countEl.textContent) || 0;
    if (isLiked) {
      btn.classList.remove('liked'); icon.textContent = '🤍'; countEl.textContent = Math.max(0, count - 1);
      await sb.from('likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
    } else {
      btn.classList.add('liked'); icon.textContent = '❤️'; countEl.textContent = count + 1;
      burstParticles(btn.querySelector('.particles'));
      await sb.from('likes').insert({ post_id: postId, user_id: currentUser.id });
    }
  }

  async function toggleFollow(btn, userId) {
    if (!currentUser) { showToast('Sign in to follow!'); return; }
    const isFollowing = btn.classList.contains('following');
    btn.classList.toggle('following');
    btn.textContent = isFollowing ? 'Follow' : 'Following';
    if (isFollowing) { await sb.from('follows').delete().eq('follower_id', currentUser.id).eq('following_id', userId); showToast('Unfollowed'); }
    else { await sb.from('follows').insert({ follower_id: currentUser.id, following_id: userId }); showToast('Now following! 🐝'); }
  }

  async function postVibe() {
    // Always get fresh session
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { showToast('Please sign in first!'); return; }
    currentUser = session.user;
    const text = document.getElementById('compose-text').value.trim();
    if (!text) { showToast('Write something first ✍️'); return; }
    const { data, error } = await sb.from('posts').insert({ user_id: currentUser.id, body: text }).select('*, profiles(username,full_name)').single();
    if (error) { console.error('Post error:', error); showToast('Error: ' + error.message); return; }
    document.getElementById('compose-text').value = '';
    const container = document.getElementById('posts-container');
    const empty = container.querySelector('.empty-state');
    if (empty) container.innerHTML = '';
    container.insertBefore(createPostCard(data), container.firstChild);
    showToast('Vibe posted! 🐝✨');
  }

  // NAV
  function setNav(el, panel) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    ['feed','explore','notifs','profile'].forEach(p => document.getElementById(p+'-panel').style.display = p === panel ? 'block' : 'none');
    if (panel === 'profile') loadProfileStats();
  }

  async function loadProfileStats() {
    if (!currentUser) return;
    const { count: posts } = await sb.from('posts').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
    const { count: followers } = await sb.from('follows').select('*', { count: 'exact', head: true }).eq('following_id', currentUser.id);
    const { count: following } = await sb.from('follows').select('*', { count: 'exact', head: true }).eq('follower_id', currentUser.id);
    document.getElementById('my-posts-count').textContent = posts || 0;
    document.getElementById('my-followers-count').textContent = followers || 0;
    document.getElementById('my-following-count').textContent = following || 0;
  }

  function switchTab(el) { document.querySelectorAll('.feed-tab').forEach(t => t.classList.remove('active')); el.classList.add('active'); }
  function toggleTheme() { document.getElementById('phone').classList.toggle('light-mode'); document.getElementById('theme-btn').textContent = document.getElementById('phone').classList.contains('light-mode') ? '☀️' : '🌙'; }

  // HELPERS
  function formatBody(text) { return text.replace(/#(\w+)/g,'<span class="post-hashtag">#$1</span>'); }
  function timeAgo(date) { const d = Date.now() - new Date(date).getTime(); const m = Math.floor(d/60000); if(m<1) return 'just now'; if(m<60) return m+'m'; const h = Math.floor(m/60); if(h<24) return h+'h'; return Math.floor(h/24)+'d'; }
  function getColor(n) { const c=['#F5C518','#FF6B35','#4ECDC4','#45B7D1','#96CEB4','#DDA0DD']; let h=0; for(let x of n) h=x.charCodeAt(0)+h*31; return c[Math.abs(h)%c.length]; }
  function burstParticles(container) {
    ['❤️','✨','💛','⭐'].forEach((e,i) => {
      const p = document.createElement('div'); p.className = 'particle'; p.textContent = e;
      const a = (i/4)*360; const d = 30+Math.random()*20;
      p.style.setProperty('--dx', Math.cos(a*Math.PI/180)*d+'px');
      p.style.setProperty('--dy', Math.sin(a*Math.PI/180)*d+'px');
      container.appendChild(p); setTimeout(() => p.remove(), 700);
    });
  }
  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
</script>
</body>
</html>
