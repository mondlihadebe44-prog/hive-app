<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Hive · Your Vibe + Circles + Voice</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* HEXAGON SHAPE (replaces boring circles) */
    .hexagon, .avatar-hex, .hex-avatar, .circle-avatar {
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    }

    /* BLACK + GOLD THEME */
    body {
      background: #000000;
      font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
      padding: 20px 16px 90px 16px;
      color: #F0EDE5;
    }

    /* subtle honeycomb dots */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 10% 20%, rgba(245,184,27,0.05) 1.5px, transparent 1.5px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: -1;
    }

    .app-container {
      max-width: 600px;
      margin: 0 auto;
    }

    /* header + profile */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #F5B81B;
    }
    .profile-hex {
      width: 48px;
      height: 48px;
      background: #1C1C1C;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      border: 1.5px solid #F5B81B;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      cursor: pointer;
    }

    /* PUBLIC / CIRCLES TOGGLE (the missing gap) */
    .mode-toggle {
      display: flex;
      background: #1A1A1A;
      padding: 4px;
      gap: 6px;
      clip-path: polygon(10% 0%, 90% 0%, 100% 50%, 90% 100%, 10% 100%, 0% 50%);
      margin-bottom: 20px;
    }
    .mode-btn {
      border: none;
      background: transparent;
      padding: 10px 20px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      color: #CCCCCC;
      clip-path: polygon(20% 0%, 80% 0%, 100% 50%, 80% 100%, 20% 100%, 0% 50%);
      transition: 0.2s;
    }
    .mode-btn.active {
      background: #F5B81B;
      color: #000000;
    }

    /* sections */
    .section {
      display: none;
      animation: fade 0.2s ease;
    }
    .section.active-section {
      display: block;
    }
    @keyframes fade {
      from { opacity: 0; transform: translateY(5px);}
      to { opacity: 1; transform: translateY(0);}
    }

    /* ----- YOUR EXISTING VIBE CHECK & FEED (merged) ----- */
    .vibe-card {
      background: #0D0D0D;
      border: 1px solid #F5B81B40;
      padding: 20px;
      border-radius: 28px;
      margin-bottom: 20px;
      text-align: center;
    }
    .mood-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      font-size: 2rem;
      margin: 12px 0;
    }
    .mood-emoji {
      cursor: pointer;
      transition: 0.1s;
      opacity: 0.6;
    }
    .mood-emoji.selected {
      opacity: 1;
      transform: scale(1.2);
      filter: drop-shadow(0 0 6px #F5B81B);
    }
    .vibe-input {
      width: 100%;
      background: #1A1A1A;
      border: 1px solid #F5B81B40;
      padding: 12px;
      border-radius: 60px;
      color: white;
      margin: 12px 0;
    }
    .share-btn {
      background: #F5B81B;
      border: none;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: bold;
      color: black;
      clip-path: polygon(15% 0%, 85% 0%, 100% 50%, 85% 100%, 15% 100%, 0% 50%);
      cursor: pointer;
    }
    .post-card {
      background: #0D0D0D;
      border: 1px solid #F5B81B40;
      padding: 16px;
      margin-bottom: 14px;
      border-radius: 24px;
    }
    .post-header {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }
    .hex-avatar-small {
      width: 44px;
      height: 44px;
      background: #1C1C1C;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      border: 1px solid #F5B81B;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    }
    .post-username {
      font-weight: bold;
      color: #F5CD6E;
    }
    .post-time {
      font-size: 0.7rem;
      color: #888;
    }
    .post-text {
      margin: 8px 0;
    }
    .post-stats {
      display: flex;
      gap: 20px;
      margin-top: 8px;
      color: #F5B81B;
    }

    /* circles mode specific (5-15 people groups) */
    .circles-header {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      margin-bottom: 20px;
    }
    .circle-chip {
      background: #0D0D0D;
      padding: 8px 18px;
      border: 1px solid #F5B81B;
      clip-path: polygon(15% 0%, 85% 0%, 100% 50%, 85% 100%, 15% 100%, 0% 50%);
      white-space: nowrap;
      cursor: pointer;
      color: #eee;
    }
    .circle-chip.active {
      background: #F5B81B;
      color: black;
    }
    .chat-message {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .voice-note-badge {
      background: #1A1A1A;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 40px;
      margin-top: 6px;
      color: #F5B81B;
    }
    .circles-composer {
      display: flex;
      gap: 12px;
      background: #0D0D0D;
      padding: 8px 12px;
      border-radius: 60px;
      margin-top: 12px;
      border: 1px solid #F5B81B40;
    }
    .circles-composer input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      padding: 10px 0;
      outline: none;
    }
    .voice-btn {
      background: #F5B81B;
      border: none;
      border-radius: 40px;
      padding: 6px 18px;
      font-weight: bold;
      clip-path: polygon(15% 0%, 85% 0%, 100% 50%, 85% 100%, 15% 100%, 0% 50%);
      cursor: pointer;
    }

    /* public hives to join (fill empty feed) */
    .public-hives {
      background: #0A0A0A;
      border: 1px solid #F5B81B40;
      padding: 18px;
      border-radius: 28px;
      margin-top: 20px;
    }
    .hive-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #F5B81B20;
    }
    .join-btn {
      background: #F5B81B20;
      border: 1px solid #F5B81B;
      padding: 4px 16px;
      border-radius: 40px;
      cursor: pointer;
    }

    .toast {
      background: #F5B81B;
      color: black;
      padding: 8px 20px;
      border-radius: 60px;
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-weight: bold;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
      z-index: 200;
    }
    footer {
      text-align: center;
      font-size: 0.7rem;
      color: #6c6c6c;
      margin-top: 28px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- top header with hexagon profile -->
  <div class="top-bar">
    <div class="logo">⬡ HIVE <span style="font-size:0.7rem;">vibe+circle</span></div>
    <div class="profile-hex" id="profileBtn">🐝</div>
  </div>

  <!-- PUBLIC / CIRCLES TOGGLE (the main gap closer) -->
  <div class="mode-toggle" id="modeToggle">
    <button class="mode-btn active" data-mode="public">🌍 Public</button>
    <button class="mode-btn" data-mode="circles">🍯 Circles (5-15)</button>
  </div>

  <!-- ========= PUBLIC MODE (your vibe check + feed) ========= -->
  <div id="publicSection" class="section active-section">
    <!-- Vibe Check Card (your original idea) -->
    <div class="vibe-card">
      <h3 style="color:#F5CD6E;">Vibe Check 😎</h3>
      <div class="mood-row" id="moodRow">
        <span class="mood-emoji" data-mood="😎">😎</span>
        <span class="mood-emoji" data-mood="🔥">🔥</span>
        <span class="mood-emoji" data-mood="❤️">❤️</span>
        <span class="mood-emoji" data-mood="😂">😂</span>
        <span class="mood-emoji" data-mood="🤯">🤯</span>
      </div>
      <input type="text" class="vibe-input" id="vibeMessage" placeholder="Add a message... (optional)">
      <div style="display: flex; gap:10px; justify-content:center;">
        <button class="share-btn" id="shareVibeBtn">Share Vibe Check 😎</button>
        <button class="share-btn" id="voiceVibeBtn">🎤 Voice Vibe</button>
      </div>
    </div>

    <!-- Feed (For You / Following / Trending) you already had -->
    <div style="display: flex; gap: 16px; margin-bottom: 16px;">
      <span id="forYouTab" style="cursor:pointer; border-bottom:2px solid #F5B81B; padding-bottom:4px;">For You</span>
      <span id="followingTab" style="cursor:pointer; color:#888;">Following</span>
      <span id="trendingTab" style="cursor:pointer; color:#888;">Trending</span>
    </div>
    <div id="feedContainer"></div>

    <!-- JOIN PUBLIC HIVES (to fill empty feed, discover groups) -->
    <div class="public-hives">
      <div style="font-weight:bold; margin-bottom:8px;">🍯 Join a Hive (5-15 people)</div>
      <div id="hivesList"></div>
    </div>
  </div>

  <!-- ========= CIRCLES MODE (private groups 5-15, voice notes) ========= -->
  <div id="circlesSection" class="section">
    <div class="circles-header" id="circlesList"></div>
    <div id="circleChatArea" style="background:#0A0A0A; border-radius:28px; padding:16px; min-height:300px;"></div>
    <div class="circles-composer">
      <input type="text" id="circleMsgInput" placeholder="message or tap voice...">
      <button class="voice-btn" id="circleVoiceBtn">🎤 1-tap voice</button>
    </div>
    <div class="public-hives" style="margin-top:20px;">
      <div style="font-weight:bold;">✨ discover more circles (5-15 members)</div>
      <div id="discoverCirclesList"></div>
    </div>
  </div>

  <footer>Hive · Public + Circles · 1-tap voice notes · hexagon identity 🐝⬡</footer>
</div>
<div id="toastMsg" class="toast">✨</div>

<script>
  // ---------- DATA ----------
  let currentUser = { name: "Mondli", username: "@MichaelHadebe", avatar: "🐝" };
  let selectedMood = "😎";
  
  // public posts (merged with your old vibe posts)
  let publicPosts = [
    { id: "p1", user: "Mondli Hadebe", username: "@MichaelHadebe", avatar: "🐝", text: "Orlando Pirates supporter 🏴❤️", time: "2h ago", likes: 12, comments: 3, mood: "😎" },
    { id: "p2", user: "Asanda Mbhense", username: "@Asanda99", avatar: "✨", text: "Life is like a dice you never know what comes next", time: "2h ago", likes: 24, comments: 5, mood: "🔥" },
    { id: "p3", user: "Sibusiso Hadebe", username: "@Sibusiso", avatar: "⚡", text: "Hi sanibona 😊", time: "5h ago", likes: 8, comments: 2, mood: "😊" }
  ];

  // Circles (5-15 people groups)
  let circles = [
    { id: "c1", name: "🍯 Yes, Please", members: ["Mondli","Sara","DevMike","ArtLena"], memberCount: 7 },
    { id: "c2", name: "👨‍💻 DevCircle", members: ["Mondli","Mike","Alex","Priya"], memberCount: 6 },
    { id: "c3", name: "🎨 Art Hive", members: ["Lena","Mondli","Sara","Jules"], memberCount: 8 }
  ];
  
  let circleMessages = {
    c1: [{ sender: "Sara", text: "hexagon avatars are fire 🔥", time: "1h ago", voice: false, avatar: "👩‍🎤" },
         { sender: "DevMike", text: "🎤 voice note: circles feel private & cozy", time: "30m ago", voice: true, duration: "0:12", avatar: "👨‍💻" }],
    c2: [{ sender: "Mike", text: "5-15 people groups = real convos", time: "2h ago", voice: false, avatar: "👨‍💻" }],
    c3: [{ sender: "Lena", text: "voice notes make it so easy", time: "3h ago", voice: false, avatar: "🎨" }]
  };
  
  let activeCircleId = "c1";
  let currentMode = "public";
  let currentTab = "forYou";

  // Discoverable public hives (to join)
  const discoverHives = [
    { name: "🍃 Cape Town creatives", members: 12, vibe: "art, music" },
    { name: "🎮 Jozi gaming den", members: 9, vibe: "ranked & chill" },
    { name: "🌿 wellness hive", members: 14, vibe: "meditation" }
  ];

  // Helper: toast notification
  function showToast(msg) {
    let toast = document.getElementById('toastMsg');
    toast.innerText = msg;
    toast.style.opacity = "1";
    setTimeout(() => toast.style.opacity = "0", 1800);
  }

  // ----- mood selector (your vibe picker) -----
  document.querySelectorAll('.mood-emoji').forEach(emoji => {
    emoji.addEventListener('click', () => {
      document.querySelectorAll('.mood-emoji').forEach(e => e.classList.remove('selected'));
      emoji.classList.add('selected');
      selectedMood = emoji.getAttribute('data-mood');
    });
  });
  document.getElementById('shareVibeBtn')?.addEventListener('click', () => {
    let msg = document.getElementById('vibeMessage').value;
    let vibeText = msg ? `${selectedMood} ${msg}` : `${selectedMood} vibe check`;
    publicPosts.unshift({
      id: "p"+Date.now(), user: currentUser.name, username: currentUser.username,
      avatar: currentUser.avatar, text: vibeText, time: "just now", likes: 0, comments: 0, mood: selectedMood
    });
    document.getElementById('vibeMessage').value = '';
    renderFeed();
    showToast("Vibe posted to public feed ✨");
  });
  document.getElementById('voiceVibeBtn')?.addEventListener('click', () => {
    showToast("🎤 voice vibe demo · 1-tap voice note would record here");
    publicPosts.unshift({
      id: "p"+Date.now(), user: currentUser.name, username: currentUser.username,
      avatar: currentUser.avatar, text: "🎤 voice vibe: feeling great!", time: "just now", likes: 0, comments: 0, mood: "🎤"
    });
    renderFeed();
  });

  // render public feed (For You / Following / Trending)
  function renderFeed() {
    let container = document.getElementById('feedContainer');
    if (!container) return;
    let filtered = [...publicPosts];
    if (currentTab === 'following') filtered = filtered.filter(p => p.user !== currentUser.name);
    if (currentTab === 'trending') filtered = filtered.sort((a,b) => b.likes - a.likes);
    container.innerHTML = '';
    filtered.forEach(post => {
      let div = document.createElement('div');
      div.className = 'post-card';
      div.innerHTML = `
        <div class="post-header">
          <div class="hex-avatar-small">${post.avatar}</div>
          <div><span class="post-username">${post.user}</span> <span class="post-time">${post.username} · ${post.time}</span></div>
        </div>
        <div class="post-text">${post.text}</div>
        <div class="post-stats">
          <span class="like-btn" data-id="${post.id}">❤️ ${post.likes}</span>
          <span>💬 ${post.comments}</span>
        </div>
      `;
      let likeBtn = div.querySelector('.like-btn');
      likeBtn.addEventListener('click', () => { post.likes++; renderFeed(); showToast("❤️ liked"); });
      container.appendChild(div);
    });
  }

  // ----- CIRCLES MODE (5-15 people groups + 1-tap voice)-----
  function renderCirclesList() {
    let container = document.getElementById('circlesList');
    if (!container) return;
    container.innerHTML = '';
    circles.forEach(circle => {
      let chip = document.createElement('div');
      chip.className = `circle-chip ${activeCircleId === circle.id ? 'active' : ''}`;
      chip.innerText = `${circle.name} (${circle.memberCount})`;
      chip.addEventListener('click', () => {
        activeCircleId = circle.id;
        renderCirclesList();
        renderCircleChat();
      });
      container.appendChild(chip);
    });
  }
  function renderCircleChat() {
    let container = document.getElementById('circleChatArea');
    if (!container) return;
    let msgs = circleMessages[activeCircleId] || [];
    let activeCircle = circles.find(c => c.id === activeCircleId);
    let memberPreview = activeCircle ? activeCircle.members.slice(0,4).join(', ') + (activeCircle.memberCount>4?'…':'') : '';
    let html = `<div style="margin-bottom:12px; font-size:0.75rem; background:#111; padding:6px 12px; clip-path:polygon(10% 0%,90% 0%,100% 50%,90% 100%,10% 100%,0% 50%); display:inline-block;">👥 ${memberPreview} · ${activeCircle?.memberCount||5} members (5-15 group)</div>`;
    msgs.forEach(m => {
      html += `<div class="chat-message">
        <div class="hex-avatar-small" style="width:38px;height:38px;">${m.avatar}</div>
        <div style="background:#121212; padding:8px 12px; border-radius:20px; max-width:80%;">
          <div style="font-weight:bold; font-size:0.7rem; color:#F5CD6E;">${m.sender} · ${m.time}</div>
          <div>${m.voice ? `🎤 ${m.text}` : m.text}</div>
          ${m.voice ? `<div class="voice-note-badge">🔊 voice note · ${m.duration} ▶️ (demo)</div>` : ''}
        </div>
      </div>`;
    });
    container.innerHTML = html;
  }
  function sendCircleText(text) {
    if (!text.trim()) return;
    if (!circleMessages[activeCircleId]) circleMessages[activeCircleId] = [];
    circleMessages[activeCircleId].push({ sender: "You", text: text, time: "just now", voice: false, avatar: currentUser.avatar });
    renderCircleChat();
    document.getElementById('circleMsgInput').value = '';
    showToast("💬 sent to circle");
  }
  function addVoiceNoteToCircle() {
    if (!circleMessages[activeCircleId]) circleMessages[activeCircleId] = [];
    circleMessages[activeCircleId].push({ sender: "You", text: "🎤 1-tap voice message · hive energy!", time: "just now", voice: true, duration: "0:09", avatar: currentUser.avatar });
    renderCircleChat();
    showToast("🎤 voice note sent (1-tap)");
  }

  // render discoverable hives to join (public)
  function renderDiscoverHives() {
    let container = document.getElementById('discoverCirclesList');
    let publicHivesContainer = document.getElementById('hivesList');
    if (container) {
      container.innerHTML = '';
      discoverHives.forEach(h => {
        let row = document.createElement('div');
        row.className = 'hive-row';
        row.innerHTML = `<div><strong>${h.name}</strong><br><span style="font-size:0.7rem;">${h.members} members · ${h.vibe}</span></div>
                         <button class="join-btn" data-name="${h.name}">join →</button>`;
        row.querySelector('.join-btn').addEventListener('click', () => {
          let newId = `joined_${Date.now()}`;
          circles.push({ id: newId, name: h.name, members: ["You"], memberCount: h.members });
          circleMessages[newId] = [{ sender: "Hive", text: "welcome to your new circle! 🐝", time: "now", voice: false, avatar: "🐝" }];
          renderCirclesList();
          showToast(`🎉 joined ${h.name} circle`);
        });
        container.appendChild(row);
      });
    }
    if (publicHivesContainer) {
      publicHivesContainer.innerHTML = '';
      discoverHives.forEach(h => {
        let row = document.createElement('div');
        row.className = 'hive-row';
        row.innerHTML = `<div><strong>${h.name}</strong><br><span>${h.members} members</span></div>
                         <button class="join-btn" data-name="${h.name}">+ join hive</button>`;
        row.querySelector('.join-btn').addEventListener('click', () => {
          showToast(`✨ joined ${h.name} (discover more in circles mode)`);
        });
        publicHivesContainer.appendChild(row);
      });
    }
  }

  // mode switching (public / circles)
  function setMode(mode) {
    currentMode = mode;
    const publicDiv = document.getElementById('publicSection');
    const circlesDiv = document.getElementById('circlesSection');
    if (mode === 'public') {
      publicDiv.classList.add('active-section');
      circlesDiv.classList.remove('active-section');
      renderFeed();
    } else {
      publicDiv.classList.remove('active-section');
      circlesDiv.classList.add('active-section');
      renderCirclesList();
      renderCircleChat();
      renderDiscoverHives();
    }
    document.querySelectorAll('.mode-btn').forEach(btn => {
      if (btn.getAttribute('data-mode') === mode) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }

  // tabs for public feed
  document.getElementById('forYouTab')?.addEventListener('click', () => { currentTab='forYou'; renderFeed(); updateTabUI('forYou'); });
  document.getElementById('followingTab')?.addEventListener('click', () => { currentTab='following'; renderFeed(); updateTabUI('following'); });
  document.getElementById('trendingTab')?.addEventListener('click', () => { currentTab='trending'; renderFeed(); updateTabUI('trending'); });
  function updateTabUI(active) {
    document.getElementById('forYouTab').style.borderBottom = active==='forYou' ? '2px solid #F5B81B' : 'none';
    document.getElementById('followingTab').style.borderBottom = active==='following' ? '2px solid #F5B81B' : 'none';
    document.getElementById('trendingTab').style.borderBottom = active==='trending' ? '2px solid #F5B81B' : 'none';
    ['forYouTab','followingTab','trendingTab'].forEach(id => {
      document.getElementById(id).style.color = active===id.replace('Tab','') ? '#F5CD6E' : '#888';
    });
  }

  // profile button (simple demo)
  document.getElementById('profileBtn')?.addEventListener('click', () => {
    showToast(`🐝 ${currentUser.name} · edit profile later`);
  });
  document.getElementById('circleVoiceBtn')?.addEventListener('click', addVoiceNoteToCircle);
  document.getElementById('circleMsgInput')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendCircleText(e.target.value); });

  // mode toggle listeners
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', (e) => setMode(btn.getAttribute('data-mode')));
  });

  // initial load
  renderFeed();
  setMode('public');
  renderDiscoverHives();
  document.querySelector('.mood-emoji')?.classList.add('selected');
  updateTabUI('forYou');
</script>
</body>
</html>
