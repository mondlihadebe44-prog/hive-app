<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Hive · Friends + Feed + 1-Tap Voice</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      color: #FFFFFF;
      padding-bottom: 70px;
    }

    /* main container */
    .app-container {
      max-width: 500px;
      margin: 0 auto;
      background: #000000;
      min-height: 100vh;
      position: relative;
    }

    /* status bar mock */
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px 6px;
      font-size: 0.85rem;
      color: #fff;
      background: #000;
    }

    /* circles row (Yes, Please / DevMike / ArtLena) */
    .circles-row {
      display: flex;
      gap: 16px;
      padding: 8px 16px;
      overflow-x: auto;
      border-bottom: 0.5px solid #222;
    }
    .circle-tab {
      font-size: 1rem;
      font-weight: 500;
      padding-bottom: 8px;
      color: #888;
      white-space: nowrap;
    }
    .circle-tab.active {
      color: #F5B81B;
      border-bottom: 2px solid #F5B81B;
    }

    /* section headers */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 16px 16px 8px;
    }
    .section-header h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
    }
    .section-header span {
      font-size: 0.75rem;
      color: #F5B81B;
    }

    /* friend / message rows */
    .friend-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 14px;
      border-bottom: 0.5px solid #1c1c1c;
      cursor: pointer;
    }
    .avatar-hex {
      width: 52px;
      height: 52px;
      background: #1E1E1E;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    }
    .friend-info {
      flex: 1;
    }
    .friend-name {
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .username {
      font-size: 0.75rem;
      color: #888;
      font-weight: normal;
    }
    .message-preview {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .time {
      font-size: 0.7rem;
      color: #666;
    }
    .crown {
      color: #F5B81B;
      margin-left: 4px;
    }
    .reactions {
      display: flex;
      gap: 4px;
      font-size: 0.75rem;
    }

    /* feed posts (social) */
    .feed-post {
      padding: 14px 16px;
      border-bottom: 0.5px solid #1c1c1c;
    }
    .post-header {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
    }
    .post-avatar {
      width: 44px;
      height: 44px;
      background: #1E1E1E;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    }
    .post-user {
      flex: 1;
    }
    .post-name {
      font-weight: 600;
    }
    .post-handle {
      font-size: 0.7rem;
      color: #888;
    }
    .post-text {
      margin: 8px 0;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    .post-stats {
      display: flex;
      gap: 20px;
      margin-top: 10px;
      font-size: 0.75rem;
      color: #aaa;
    }

    /* BOTTOM NAVIGATION */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 500px;
      margin: 0 auto;
      background: #0a0a0a;
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-around;
      padding: 10px 20px 20px;
      border-top: 0.5px solid #222;
      z-index: 10;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      color: #777;
      cursor: pointer;
    }
    .nav-item.active {
      color: #F5B81B;
    }
    .nav-icon {
      font-size: 1.4rem;
    }

    /* COMPOSER (Post to Your Hive + 1-Tap Voice) */
    .composer-card {
      background: #0D0D0D;
      margin: 16px;
      padding: 16px;
      border-radius: 28px;
      border: 1px solid #222;
    }
    .composer-title {
      font-weight: 600;
      margin-bottom: 12px;
    }
    .composer-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .action-btn {
      background: #1A1A1A;
      border: none;
      padding: 12px 18px;
      border-radius: 40px;
      color: white;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      flex: 1;
      justify-content: center;
    }
    .voice-btn {
      background: #F5B81B;
      color: black;
      font-weight: bold;
    }

    /* modal for post creation */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.9);
      z-index: 20;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-content {
      background: #111;
      border-radius: 32px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
    }
    .modal textarea {
      width: 100%;
      background: #1c1c1c;
      border: none;
      padding: 14px;
      border-radius: 20px;
      color: white;
      margin: 16px 0;
    }
    .close-modal {
      background: #F5B81B;
      border: none;
      padding: 10px;
      border-radius: 40px;
      font-weight: bold;
    }
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: #F5B81B;
      color: black;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: bold;
      z-index: 30;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="status-bar">9:41</div>

  <!-- Top circles: Yes, Please / DevMike / ArtLena (exactly like your picture) -->
  <div class="circles-row" id="circlesRow">
    <div class="circle-tab active" data-mode="feed">Yes, Please</div>
    <div class="circle-tab" data-mode="feed">DevMike</div>
    <div class="circle-tab" data-mode="feed">ArtLena</div>
  </div>

  <!-- DYNAMIC CONTENT (Friends / Feed) -->
  <div id="mainContent"></div>

  <!-- composer (Post to Your Hive + 1-Tap Voice) -->
  <div class="composer-card">
    <div class="composer-title">Post to Your Hive</div>
    <div class="composer-buttons">
      <button class="action-btn" id="showTextModalBtn">📝 Text</button>
      <button class="action-btn voice-btn" id="oneTapVoiceBtn">🎤 1-Tap Voice Note</button>
      <button class="action-btn" id="showPhotoBtn">📸 Photo</button>
      <button class="action-btn" id="showVideoBtn">🎬 Video</button>
    </div>
  </div>
</div>

<!-- bottom navigation (Home, Compass, Notifications, Profile) -->
<div class="bottom-nav">
  <div class="nav-item active" data-nav="home">🏠<span>Home</span></div>
  <div class="nav-item" data-nav="compass">🧭<span>Compass</span></div>
  <div class="nav-item" data-nav="notifications">🔔<span>Notifications</span></div>
  <div class="nav-item" data-nav="profile">👤<span>Profile</span></div>
</div>

<div id="toastMsg" class="toast">✨</div>

<!-- modal for text post -->
<div id="postModal" class="modal">
  <div class="modal-content">
    <h3 style="color:#F5B81B;">What's the vibe?</h3>
    <textarea id="postText" rows="3" placeholder="Share with your hive..."></textarea>
    <button id="submitPostBtn" class="close-modal">Share →</button>
    <button id="closeModalBtn" style="margin-top:8px; background:#333;">Cancel</button>
  </div>
</div>

<script>
  // ---------- DATA (matches your pictures) ----------
  // friends list with crowns, messages, reactions
  let friends = [
    { id: 1, name: "Friiadar", username: "Limyr Anna", age: "21", message: "You'll are it is ittris mall greep, aro tien a fortion, wrishing Thate and sucresse doulff you ands Preiods aile rlo 💖 Fui)", time: "4:25", crowns: 4, hearts: "👑 4 👑", avatar: "✨" },
    { id: 2, name: "ArtLina", username: "Anina", age: "31", message: "You 're dar you inte affort the putzzetn winifid will the rich, are t us this ffields wher your sive acy plars.", time: "4:25", crowns: 4, hearts: "👑 4 👑", avatar: "🎨" },
    { id: 3, name: "Friiadar", username: "Anina", age: "31", message: "Buticking alry by be litt io your merases impement way gut the of foettert's whal's evepy, fgming shees you the eurning the cemer codes 😊", time: "2:25", crowns: 2, hearts: "👑 2 👑", avatar: "🔥" },
    { id: 4, name: "Roh Lena", username: "Anna", age: "41", message: "You're like a little more than a little more than a little...", time: "now", crowns: 0, hearts: "💖", avatar: "🌸" }
  ];

  // feed posts (social)
  let feedPosts = [
    { id: 1, user: "Mondli Hadebe", handle: "@MichaelHadebe", avatar: "🐝", text: "Orlando Pirates supporter 🏴❤️ #hive", time: "2h", likes: 24, replies: 3 },
    { id: 2, user: "Asanda Mbhense", handle: "@Asanda99", avatar: "🌟", text: "Life is like a dice you never know what comes next", time: "2h", likes: 18, replies: 5 },
    { id: 3, user: "Sibusiso Hadebe", handle: "@Sibusiso", avatar: "⚡", text: "Hi sanibona 😊", time: "5h", likes: 9, replies: 2 }
  ];

  let currentView = "friends"; // friends or feed
  let currentNav = "home";

  function showToast(msg) {
    let toast = document.getElementById('toastMsg');
    toast.innerText = msg;
    toast.style.opacity = '1';
    setTimeout(() => toast.style.opacity = '0', 1800);
  }

  // render friends list (exactly like your picture: crowns, messages, times)
  function renderFriends() {
    let container = document.getElementById('mainContent');
    container.innerHTML = `<div class="section-header"><h2>Friends</h2><span>💖 active now</span></div>`;
    friends.forEach(f => {
      let div = document.createElement('div');
      div.className = 'friend-row';
      div.innerHTML = `
        <div class="avatar-hex">${f.avatar}</div>
        <div class="friend-info">
          <div class="friend-name">${f.name} <span class="username">${f.username} ${f.age}</span> ${f.crowns > 0 ? '<span class="crown">👑</span>' : ''}</div>
          <div class="message-preview">
            <span>${f.message.substring(0, 60)}${f.message.length > 60 ? '…' : ''}</span>
            <span class="time">${f.time}</span>
          </div>
          <div class="reactions">${f.hearts} ${f.crowns > 0 ? '👑' : '💖'}</div>
        </div>
      `;
      container.appendChild(div);
    });
  }

  // render feed (social timeline)
  function renderFeed() {
    let container = document.getElementById('mainContent');
    container.innerHTML = `<div class="section-header"><h2>Hive Feed</h2><span>🔥 Trending</span></div>`;
    feedPosts.forEach(post => {
      let div = document.createElement('div');
      div.className = 'feed-post';
      div.innerHTML = `
        <div class="post-header">
          <div class="post-avatar">${post.avatar}</div>
          <div class="post-user">
            <div class="post-name">${post.user}</div>
            <div class="post-handle">${post.handle} · ${post.time}</div>
          </div>
        </div>
        <div class="post-text">${post.text}</div>
        <div class="post-stats">
          <span>❤️ ${post.likes}</span>
          <span>💬 ${post.replies}</span>
          <span>🔁</span>
        </div>
      `;
      container.appendChild(div);
    });
  }

  // toggle between friends (circles) and feed based on top circles / nav
  function setView(view) {
    currentView = view;
    if (view === 'friends') {
      renderFriends();
    } else {
      renderFeed();
    }
    // update active circle tab style
    let circles = document.querySelectorAll('.circle-tab');
    circles.forEach((tab, idx) => {
      if ((view === 'friends' && idx === 0) || (view === 'feed' && idx !== 0)) {
        tab.classList.add('active');
      } else {
        tab.classList.remove('active');
      }
    });
  }

  // bottom navigation handler
  function setNav(nav) {
    currentNav = nav;
    document.querySelectorAll('.nav-item').forEach(item => {
      if (item.getAttribute('data-nav') === nav) {
        item.classList.add('active');
      } else {
        item.classList.remove('active');
      }
    });
    if (nav === 'home') setView('friends');
    if (nav === 'compass') setView('feed');
    if (nav === 'notifications') showToast("🔔 Notifications coming soon");
    if (nav === 'profile') showToast("👤 Profile — edit later");
  }

  // ---- 1-TAP VOICE NOTE (your secret weapon) ----
  function oneTapVoice() {
    showToast("🎤 1-Tap Voice Note: 'Hey Hive!' (demo) — real recording works in app");
    // add a demo voice message to friends list (like a new message)
    friends.unshift({
      id: Date.now(), name: "You", username: "voice", age: "", 
      message: "🎤 Voice note: just sent a quick vibe", time: "now", crowns: 0, hearts: "🎤", avatar: "🐝"
    });
    if (currentView === 'friends') renderFriends();
    showToast("🎤 Voice note sent to your Hive!");
  }

  // text post modal
  const modal = document.getElementById('postModal');
  document.getElementById('showTextModalBtn').onclick = () => modal.style.display = 'flex';
  document.getElementById('closeModalBtn').onclick = () => modal.style.display = 'none';
  document.getElementById('submitPostBtn').onclick = () => {
    let text = document.getElementById('postText').value.trim();
    if (text) {
      feedPosts.unshift({
        id: Date.now(), user: "You", handle: "@you", avatar: "🐝", text: text, time: "now", likes: 0, replies: 0
      });
      if (currentView === 'feed') renderFeed();
      showToast("📝 Posted to Hive feed");
      document.getElementById('postText').value = '';
      modal.style.display = 'none';
    } else {
      showToast("Write something first");
    }
  };
  document.getElementById('oneTapVoiceBtn').onclick = oneTapVoice;
  document.getElementById('showPhotoBtn').onclick = () => showToast("📸 Photo picker — coming soon");
  document.getElementById('showVideoBtn').onclick = () => showToast("🎬 Video — coming soon");

  // top circles toggle (Yes, Please = friends / feed mode)
  const topCircles = document.querySelectorAll('.circle-tab');
  topCircles[0].addEventListener('click', () => setView('friends'));
  topCircles[1].addEventListener('click', () => setView('feed'));
  topCircles[2].addEventListener('click', () => setView('feed'));

  // bottom nav listeners
  document.querySelectorAll('.nav-item').forEach(nav => {
    nav.addEventListener('click', (e) => {
      let navType = nav.getAttribute('data-nav');
      setNav(navType);
    });
  });

  // init: show friends (home) by default
  setNav('home');
</script>
</body>
</html>
