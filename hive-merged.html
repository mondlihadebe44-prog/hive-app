<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Hive · Merged | Your Vibe + Friends Chat + Voice</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      color: #FFFFFF;
      padding-bottom: 70px;
    }

    .app-container {
      max-width: 500px;
      margin: 0 auto;
      background: #000000;
      min-height: 100vh;
      position: relative;
    }

    /* status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px 6px;
      font-size: 0.85rem;
      color: #fff;
      background: #000;
    }

    /* circles row (Yes, Please / DevMike / ArtLena) */
    .circles-row {
      display: flex;
      gap: 16px;
      padding: 8px 16px;
      overflow-x: auto;
      border-bottom: 0.5px solid #222;
    }
    .circle-tab {
      font-size: 1rem;
      font-weight: 500;
      padding-bottom: 8px;
      color: #888;
      white-space: nowrap;
      cursor: pointer;
    }
    .circle-tab.active {
      color: #F5B81B;
      border-bottom: 2px solid #F5B81B;
    }

    /* section headers */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 16px 16px 8px;
    }
    .section-header h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #fff;
    }
    .section-header span {
      font-size: 0.75rem;
      color: #F5B81B;
    }

    /* friend rows (chat style) */
    .friend-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 14px;
      border-bottom: 0.5px solid #1c1c1c;
      cursor: pointer;
    }
    .avatar-hex {
      width: 52px;
      height: 52px;
      background: #1E1E1E;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    }
    .friend-info {
      flex: 1;
    }
    .friend-name {
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .username {
      font-size: 0.75rem;
      color: #888;
      font-weight: normal;
    }
    .message-preview {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .time {
      font-size: 0.7rem;
      color: #666;
    }
    .crown {
      color: #F5B81B;
      margin-left: 4px;
    }
    .reactions {
      display: flex;
      gap: 4px;
      font-size: 0.75rem;
    }

    /* vibe check card */
    .vibe-card {
      background: #0D0D0D;
      margin: 16px;
      padding: 16px;
      border-radius: 28px;
      border: 1px solid #222;
    }
    .mood-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      font-size: 1.8rem;
      margin: 12px 0;
    }
    .mood-emoji {
      cursor: pointer;
      opacity: 0.6;
      transition: 0.1s;
    }
    .mood-emoji.selected {
      opacity: 1;
      transform: scale(1.2);
      filter: drop-shadow(0 0 6px #F5B81B);
    }
    .vibe-input {
      width: 100%;
      background: #1A1A1A;
      border: 1px solid #333;
      padding: 12px;
      border-radius: 40px;
      color: white;
      margin: 12px 0;
    }

    /* feed posts */
    .feed-post {
      padding: 14px 16px;
      border-bottom: 0.5px solid #1c1c1c;
    }
    .post-header {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
    }
    .post-avatar {
      width: 44px;
      height: 44px;
      background: #1E1E1E;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    }
    .post-user {
      flex: 1;
    }
    .post-name {
      font-weight: 600;
    }
    .post-handle {
      font-size: 0.7rem;
      color: #888;
    }
    .post-text {
      margin: 8px 0;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    .post-stats {
      display: flex;
      gap: 20px;
      margin-top: 10px;
      font-size: 0.75rem;
      color: #aaa;
    }

    /* feed tabs */
    .feed-tabs {
      display: flex;
      gap: 24px;
      padding: 12px 16px;
      border-bottom: 0.5px solid #222;
    }
    .feed-tab {
      color: #888;
      cursor: pointer;
      font-weight: 500;
    }
    .feed-tab.active {
      color: #F5B81B;
      border-bottom: 2px solid #F5B81B;
      padding-bottom: 8px;
    }

    /* bottom navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 500px;
      margin: 0 auto;
      background: #0a0a0a;
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-around;
      padding: 10px 20px 20px;
      border-top: 0.5px solid #222;
      z-index: 10;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      color: #777;
      cursor: pointer;
    }
    .nav-item.active {
      color: #F5B81B;
    }
    .nav-icon {
      font-size: 1.4rem;
    }

    /* composer buttons */
    .composer-buttons {
      display: flex;
      gap: 12px;
      margin: 12px 16px;
      flex-wrap: wrap;
    }
    .action-btn {
      background: #1A1A1A;
      border: none;
      padding: 12px 18px;
      border-radius: 40px;
      color: white;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      flex: 1;
      justify-content: center;
    }
    .voice-btn {
      background: #F5B81B;
      color: black;
      font-weight: bold;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.9);
      z-index: 20;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-content {
      background: #111;
      border-radius: 32px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
    }
    .modal textarea {
      width: 100%;
      background: #1c1c1c;
      border: none;
      padding: 14px;
      border-radius: 20px;
      color: white;
      margin: 16px 0;
    }
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: #F5B81B;
      color: black;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: bold;
      z-index: 30;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="status-bar">9:41</div>

  <!-- circles row -->
  <div class="circles-row" id="circlesRow">
    <div class="circle-tab active" data-mode="friends">Yes, Please</div>
    <div class="circle-tab" data-mode="feed">DevMike</div>
    <div class="circle-tab" data-mode="feed">ArtLena</div>
  </div>

  <!-- dynamic content -->
  <div id="mainContent"></div>

  <!-- composer buttons (1-tap voice always visible) -->
  <div class="composer-buttons">
    <button class="action-btn" id="showTextModalBtn">📝 Text</button>
    <button class="action-btn voice-btn" id="oneTapVoiceBtn">🎤 1-Tap Voice</button>
    <button class="action-btn" id="showPhotoBtn">📸 Photo</button>
  </div>
</div>

<!-- bottom navigation -->
<div class="bottom-nav">
  <div class="nav-item active" data-nav="home">🏠<span>Home</span></div>
  <div class="nav-item" data-nav="compass">🧭<span>Compass</span></div>
  <div class="nav-item" data-nav="notifications">🔔<span>Alerts</span></div>
  <div class="nav-item" data-nav="profile">👤<span>Profile</span></div>
</div>

<div id="toastMsg" class="toast">✨</div>

<!-- modal for text post -->
<div id="postModal" class="modal">
  <div class="modal-content">
    <h3 style="color:#F5B81B;">What's the vibe?</h3>
    <textarea id="postText" rows="3" placeholder="Share with your hive..."></textarea>
    <button id="submitPostBtn" class="close-modal" style="background:#F5B81B; border:none; padding:10px; border-radius:40px; font-weight:bold;">Share →</button>
    <button id="closeModalBtn" style="margin-top:8px; background:#333; border:none; padding:10px; border-radius:40px; color:white;">Cancel</button>
  </div>
</div>

<script>
  // ---------- FRIENDS DATA (chat screen) ----------
  let friends = [
    { id: 1, name: "Friiadar", username: "Limyr Anna", age: "21", message: "You'll are it is ittris mall greep, aro tien a fortion, wrishing Thate and sucresse doulff you ands Preiods aile rlo 💖", time: "4:25", crowns: 4, hearts: "👑 4 👑", avatar: "✨" },
    { id: 2, name: "ArtLina", username: "Anina", age: "31", message: "You 're dar you inte affort the putzzetn winifid will the rich, are t us this ffields wher your sive acy plars.", time: "4:25", crowns: 4, hearts: "👑 4 👑", avatar: "🎨" },
    { id: 3, name: "Friiadar", username: "Anina", age: "31", message: "Buticking alry by be litt io your merases impement way gut the of foettert's whal's evepy, fgming shees you the eurning the cemer codes 😊", time: "2:25", crowns: 2, hearts: "👑 2 👑", avatar: "🔥" },
    { id: 4, name: "Roh Lena", username: "Anna", age: "41", message: "You're like a little more than a little more...", time: "now", crowns: 0, hearts: "💖", avatar: "🌸" }
  ];

  // ---------- FEED POSTS (with your original vibe posts) ----------
  let feedPosts = [
    { id: 1, user: "Mondli Hadebe", handle: "@MichaelHadebe", avatar: "🐝", text: "Orlando Pirates supporter 🏴❤️ #hive", time: "2h", likes: 24, replies: 3 },
    { id: 2, user: "Asanda Mbhense", handle: "@Asanda99", avatar: "🌟", text: "Life is like a dice you never know what comes next", time: "2h", likes: 18, replies: 5 },
    { id: 3, user: "Sibusiso Hadebe", handle: "@Sibusiso", avatar: "⚡", text: "Hi sanibona 😊", time: "5h", likes: 9, replies: 2 }
  ];

  let currentFeedTab = "forYou";
  let selectedMood = "😎";
  let currentView = "friends"; // friends or feed
  let currentNav = "home";

  function showToast(msg) {
    let toast = document.getElementById('toastMsg');
    toast.innerText = msg;
    toast.style.opacity = '1';
    setTimeout(() => toast.style.opacity = '0', 1800);
  }

  // ----- RENDER FRIENDS CHAT (picture-perfect style) -----
  function renderFriends() {
    let container = document.getElementById('mainContent');
    container.innerHTML = `<div class="section-header"><h2>Friends</h2><span>💖 active now</span></div>`;
    friends.forEach(f => {
      let div = document.createElement('div');
      div.className = 'friend-row';
      div.innerHTML = `
        <div class="avatar-hex">${f.avatar}</div>
        <div class="friend-info">
          <div class="friend-name">${f.name} <span class="username">${f.username} ${f.age}</span> ${f.crowns > 0 ? '<span class="crown">👑</span>' : ''}</div>
          <div class="message-preview">
            <span>${f.message.substring(0, 60)}${f.message.length > 60 ? '…' : ''}</span>
            <span class="time">${f.time}</span>
          </div>
          <div class="reactions">${f.hearts} ${f.crowns > 0 ? '👑' : '💖'}</div>
        </div>
      `;
      container.appendChild(div);
    });
  }

  // ----- RENDER FEED (your original vibe check + posts) -----
  function renderFeed() {
    let container = document.getElementById('mainContent');
    container.innerHTML = `
      <div class="vibe-card">
        <h3 style="color:#F5B81B;">Vibe Check 😎</h3>
        <div class="mood-row" id="moodRow">
          <span class="mood-emoji" data-mood="😎">😎</span>
          <span class="mood-emoji" data-mood="🔥">🔥</span>
          <span class="mood-emoji" data-mood="❤️">❤️</span>
          <span class="mood-emoji" data-mood="😂">😂</span>
          <span class="mood-emoji" data-mood="🤯">🤯</span>
        </div>
        <input type="text" class="vibe-input" id="vibeMessage" placeholder="Add a message... (optional)">
        <button class="action-btn" id="shareVibeBtn" style="background:#F5B81B; color:black;">Share Vibe →</button>
      </div>
      <div class="feed-tabs">
        <span class="feed-tab ${currentFeedTab === 'forYou' ? 'active' : ''}" data-tab="forYou">For You</span>
        <span class="feed-tab ${currentFeedTab === 'following' ? 'active' : ''}" data-tab="following">Following</span>
        <span class="feed-tab ${currentFeedTab === 'trending' ? 'active' : ''}" data-tab="trending">Trending</span>
      </div>
      <div id="feedPostsContainer"></div>
    `;

    // mood selector
    document.querySelectorAll('.mood-emoji').forEach(emoji => {
      emoji.addEventListener('click', () => {
        document.querySelectorAll('.mood-emoji').forEach(e => e.classList.remove('selected'));
        emoji.classList.add('selected');
        selectedMood = emoji.getAttribute('data-mood');
      });
    });
    document.querySelector('.mood-emoji')?.classList.add('selected');

    // share vibe button
    document.getElementById('shareVibeBtn')?.addEventListener('click', () => {
      let msg = document.getElementById('vibeMessage').value;
      let vibeText = msg ? `${selectedMood} ${msg}` : `${selectedMood} vibe check`;
      feedPosts.unshift({
        id: Date.now(), user: "You", handle: "@you", avatar: "🐝", text: vibeText, time: "now", likes: 0, replies: 0
      });
      document.getElementById('vibeMessage').value = '';
      renderFeedPosts();
      showToast("Vibe posted to feed!");
    });

    // feed tabs
    document.querySelectorAll('.feed-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        currentFeedTab = tab.getAttribute('data-tab');
        renderFeedPosts();
        document.querySelectorAll('.feed-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });

    renderFeedPosts();
  }

  function renderFeedPosts() {
    let container = document.getElementById('feedPostsContainer');
    if (!container) return;
    let filtered = [...feedPosts];
    if (currentFeedTab === 'following') filtered = filtered.filter(p => p.user !== "You");
    if (currentFeedTab === 'trending') filtered = filtered.sort((a,b) => b.likes - a.likes);
    container.innerHTML = '';
    filtered.forEach(post => {
      let div = document.createElement('div');
      div.className = 'feed-post';
      div.innerHTML = `
        <div class="post-header">
          <div class="post-avatar">${post.avatar}</div>
          <div class="post-user">
            <div class="post-name">${post.user}</div>
            <div class="post-handle">${post.handle} · ${post.time}</div>
          </div>
        </div>
        <div class="post-text">${post.text}</div>
        <div class="post-stats">
          <span class="like-btn" data-id="${post.id}">❤️ ${post.likes}</span>
          <span>💬 ${post.replies}</span>
        </div>
      `;
      const likeBtn = div.querySelector('.like-btn');
      if (likeBtn) {
        likeBtn.addEventListener('click', () => {
          post.likes++;
          renderFeedPosts();
          showToast("❤️ Liked!");
        });
      }
      container.appendChild(div);
    });
  }

  // ----- 1-TAP VOICE (your secret weapon) -----
  function oneTapVoice() {
    showToast("🎤 Voice note sent to your Hive! (demo)");
    friends.unshift({
      id: Date.now(), name: "You", username: "voice", age: "",
      message: "🎤 Voice note: just sent a quick vibe", time: "now", crowns: 0, hearts: "🎤", avatar: "🐝"
    });
    if (currentView === 'friends') renderFriends();
  }

  // ----- SWITCH BETWEEN FRIENDS AND FEED -----
  function setView(view) {
    currentView = view;
    if (view === 'friends') {
      renderFriends();
    } else {
      renderFeed();
    }
    // update circle tabs
    let circles = document.querySelectorAll('.circle-tab');
    circles.forEach((tab, idx) => {
      if ((view === 'friends' && idx === 0) || (view === 'feed' && idx !== 0)) {
        tab.classList.add('active');
      } else {
        tab.classList.remove('active');
      }
    });
  }

  // ----- BOTTOM NAVIGATION -----
  function setNav(nav) {
    currentNav = nav;
    document.querySelectorAll('.nav-item').forEach(item => {
      if (item.getAttribute('data-nav') === nav) {
        item.classList.add('active');
      } else {
        item.classList.remove('active');
      }
    });
    if (nav === 'home') setView('friends');
    if (nav === 'compass') setView('feed');
    if (nav === 'notifications') showToast("🔔 Alerts coming soon");
    if (nav === 'profile') showToast("👤 Your profile — edit later");
  }

  // ----- MODAL FOR TEXT POST -----
  const modal = document.getElementById('postModal');
  document.getElementById('showTextModalBtn').onclick = () => modal.style.display = 'flex';
  document.getElementById('closeModalBtn').onclick = () => modal.style.display = 'none';
  document.getElementById('submitPostBtn').onclick = () => {
    let text = document.getElementById('postText').value.trim();
    if (text) {
      feedPosts.unshift({
        id: Date.now(), user: "You", handle: "@you", avatar: "🐝", text: text, time: "now", likes: 0, replies: 0
      });
      if (currentView === 'feed') renderFeedPosts();
      showToast("📝 Posted to feed!");
      document.getElementById('postText').value = '';
      modal.style.display = 'none';
    } else {
      showToast("Write something first");
    }
  };

  // button listeners
  document.getElementById('oneTapVoiceBtn').onclick = oneTapVoice;
  document.getElementById('showPhotoBtn').onclick = () => showToast("📸 Photo picker coming soon");

  // top circles click
  document.querySelectorAll('.circle-tab').forEach((tab, idx) => {
    tab.addEventListener('click', () => {
      if (idx === 0) setView('friends');
      else setView('feed');
    });
  });

  // bottom nav listeners
  document.querySelectorAll('.nav-item').forEach(nav => {
    nav.addEventListener('click', () => setNav(nav.getAttribute('data-nav')));
  });

  // start with home/friends
  setNav('home');
</script>
</body>
</html>
